<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>משרות בישראל</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f8fafc; }
    .job-card { transition: all 0.15s ease; }
    .job-card:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.10); }
    .badge-new { animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.7} }
    .skill-tag { cursor: default; }
    details summary { cursor: pointer; list-style: none; }
    details summary::-webkit-details-marker { display: none; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  </style>
</head>
<body class="min-h-screen">

  <!-- Header -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-10 shadow-sm">
    <div class="max-w-5xl mx-auto px-4 py-4">
      <div class="flex items-center justify-between mb-3">
        <h1 class="text-2xl font-bold text-gray-800">🇮🇱 משרות בישראל</h1>
        <span id="total-count" class="text-sm text-gray-500 bg-gray-100 px-3 py-1 rounded-full">טוען...</span>
      </div>

      <!-- Filters row 1 -->
      <div class="flex flex-col sm:flex-row gap-2 mb-2">
        <input
          id="search"
          type="text"
          placeholder="חיפוש לפי תפקיד, כישור..."
          class="flex-1 border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
        />
        <select id="company-filter" class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 bg-white">
          <option value="">כל החברות</option>
        </select>
        <select id="date-filter" class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 bg-white">
          <option value="all">כל הזמן</option>
          <option value="today">היום</option>
          <option value="week">השבוע</option>
          <option value="month">החודש</option>
        </select>
      </div>

      <!-- Filters row 2 -->
      <div class="flex flex-wrap gap-2">
        <select id="seniority-filter" class="border border-gray-300 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 bg-white">
          <option value="">כל הרמות</option>
          <option value="Junior">Junior</option>
          <option value="Mid">Mid</option>
          <option value="Senior">Senior</option>
          <option value="Lead">Lead</option>
          <option value="Manager">Manager</option>
        </select>
        <input
          id="skill-search"
          type="text"
          placeholder="כישור ספציפי (Python, React...)"
          class="border border-gray-300 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 w-52"
        />
        <select id="experience-filter" class="border border-gray-300 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 bg-white">
          <option value="">כל הניסיון</option>
          <option value="0-2">0–2 שנים</option>
          <option value="3-5">3–5 שנים</option>
          <option value="6+">6+ שנים</option>
        </select>
        <button id="reset-filters" class="text-sm text-gray-400 hover:text-gray-700 px-2">× נקה סינון</button>
      </div>
    </div>
  </header>

  <!-- Main content -->
  <main class="max-w-5xl mx-auto px-4 py-6">
    <div id="loading" class="text-center py-16 text-gray-400">
      <div class="text-4xl mb-3">⏳</div>
      <p>טוען משרות...</p>
    </div>
    <div id="error" class="hidden text-center py-16 text-red-400">
      <div class="text-4xl mb-3">❌</div>
      <p id="error-msg">שגיאה בטעינת המשרות</p>
    </div>
    <div id="empty" class="hidden text-center py-16 text-gray-400">
      <div class="text-4xl mb-3">🔍</div>
      <p>לא נמצאו משרות תואמות</p>
    </div>
    <div id="jobs-grid" class="hidden space-y-3"></div>
  </main>

  <script>
    // ─── CONFIGURATION ────────────────────────────────────────────────────────
    const SUPABASE_URL     = "https://xdtsnyultzmbnawdyaah.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhkdHNueXVsdHptYm5hd2R5YWFoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MDc5OTMsImV4cCI6MjA5NTE4Mzk5M30.6Ycogw_-1yrY0xgWYWA-PkuDY--dF-8G9Bn6RvsHTN0";
    // ─────────────────────────────────────────────────────────────────────────

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let allJobs = [];

    // ─── Load ─────────────────────────────────────────────────────────────────
    async function loadJobs() {
      try {
        const { data, error } = await db
          .from("jobs")
          .select("*")
          .eq("is_active", true)
          .order("first_seen", { ascending: false })
          .limit(3000);

        if (error) throw error;

        allJobs = data || [];
        populateCompanyFilter();
        renderJobs(allJobs);
      } catch (err) {
        showError("שגיאה: " + err.message);
      }
    }

    function populateCompanyFilter() {
      const companies = [...new Set(allJobs.map(j => j.company))].sort((a, b) => a.localeCompare(b, "he"));
      const sel = document.getElementById("company-filter");
      companies.forEach(c => {
        const opt = document.createElement("option");
        opt.value = c;
        opt.textContent = c;
        sel.appendChild(opt);
      });
    }

    // ─── Filtering ────────────────────────────────────────────────────────────
    function parseYearsExperience(val) {
      if (!val) return null;
      const m = val.match(/(\d+)/);
      return m ? parseInt(m[1]) : null;
    }

    function getFilteredJobs() {
      const query      = document.getElementById("search").value.toLowerCase().trim();
      const skillQuery = document.getElementById("skill-search").value.toLowerCase().trim();
      const company    = document.getElementById("company-filter").value;
      const dateRange  = document.getElementById("date-filter").value;
      const seniority  = document.getElementById("seniority-filter").value;
      const expRange   = document.getElementById("experience-filter").value;

      const now = new Date();
      const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const startOfWeek  = new Date(startOfToday); startOfWeek.setDate(startOfWeek.getDate() - 6);
      const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);

      return allJobs.filter(job => {
        // Text search: title + company + skills
        if (query) {
          const haystack = [job.title, job.company, ...(job.hard_skills||[]), ...(job.soft_skills||[])].join(" ").toLowerCase();
          if (!haystack.includes(query)) return false;
        }

        // Skill search (hard or soft skills array)
        if (skillQuery) {
          const allSkills = [...(job.hard_skills||[]), ...(job.soft_skills||[])].map(s => s.toLowerCase());
          if (!allSkills.some(s => s.includes(skillQuery))) return false;
        }

        if (company && job.company !== company) return false;
        if (seniority && job.seniority !== seniority) return false;

        // Experience range filter
        if (expRange) {
          const yrs = parseYearsExperience(job.years_experience);
          if (yrs === null) return false; // exclude jobs with no experience data
          if (expRange === "0-2" && yrs > 2) return false;
          if (expRange === "3-5" && (yrs < 3 || yrs > 5)) return false;
          if (expRange === "6+" && yrs < 6) return false;
        }

        // Date filter
        if (dateRange !== "all") {
          const jobDate = new Date(job.first_seen);
          if (dateRange === "today" && jobDate < startOfToday) return false;
          if (dateRange === "week"  && jobDate < startOfWeek)  return false;
          if (dateRange === "month" && jobDate < startOfMonth) return false;
        }

        return true;
      });
    }

    // ─── Render ───────────────────────────────────────────────────────────────
    function renderSkillTags(skills, colorClass) {
      if (!skills || skills.length === 0) return "";
      return skills.slice(0, 8).map(s =>
        `<span class="skill-tag text-xs px-2 py-0.5 rounded-full ${colorClass}">${esc(s)}</span>`
      ).join(" ");
    }

    function renderJobs(jobs) {
      const grid    = document.getElementById("jobs-grid");
      const loading = document.getElementById("loading");
      const empty   = document.getElementById("empty");

      loading.classList.add("hidden");

      if (jobs.length === 0) {
        grid.classList.add("hidden");
        empty.classList.remove("hidden");
        document.getElementById("total-count").textContent = "0 משרות";
        return;
      }

      empty.classList.add("hidden");
      grid.classList.remove("hidden");
      document.getElementById("total-count").textContent = `${jobs.length.toLocaleString("he")} משרות`;

      grid.innerHTML = jobs.map(job => {
        const firstSeen = new Date(job.first_seen);
        const diffHours = (new Date() - firstSeen) / 3600000;
        const isNew     = diffHours < 24;
        const isWeek    = diffHours < 168;

        const dateBadge = isNew
          ? `<span class="badge-new text-xs bg-green-100 text-green-700 font-semibold px-2 py-0.5 rounded-full">חדש ✨</span>`
          : isWeek
          ? `<span class="text-xs bg-blue-50 text-blue-600 px-2 py-0.5 rounded-full">השבוע</span>`
          : `<span class="text-xs text-gray-400">${formatDate(firstSeen)}</span>`;

        const seniorityBadge = job.seniority
          ? `<span class="text-xs bg-purple-50 text-purple-700 px-2 py-0.5 rounded-full">${esc(job.seniority)}</span>`
          : "";

        const expBadge = job.years_experience
          ? `<span class="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full">⏱ ${esc(job.years_experience)} שנות ניסיון</span>`
          : "";

        const locationHtml = job.location
          ? `<span class="text-xs text-gray-500">📍 ${esc(job.location)}</span>`
          : "";

        const hardSkillsHtml  = renderSkillTags(job.hard_skills, "bg-blue-50 text-blue-700");
        const softSkillsHtml  = renderSkillTags(job.soft_skills, "bg-amber-50 text-amber-700");

        const hasDetails = job.description || (job.hard_skills && job.hard_skills.length > 0);

        const detailsSection = hasDetails ? `
          <details class="mt-3 border-t border-gray-100 pt-3">
            <summary class="text-xs text-blue-500 hover:text-blue-700 font-medium">פרטים נוספים ▾</summary>
            <div class="mt-2 space-y-2">
              ${job.description ? `<p class="text-xs text-gray-600 leading-relaxed">${esc(job.description)}</p>` : ""}
              ${hardSkillsHtml ? `<div><span class="text-xs font-semibold text-gray-500 ml-1">כישורים טכניים:</span>${hardSkillsHtml}</div>` : ""}
              ${softSkillsHtml ? `<div><span class="text-xs font-semibold text-gray-500 ml-1">כישורים רכים:</span>${softSkillsHtml}</div>` : ""}
            </div>
          </details>` : "";

        return `
          <div class="job-card bg-white rounded-xl border border-gray-200 p-4">
            <div class="flex items-start gap-3">
              <div class="flex-1 min-w-0">
                <div class="flex flex-wrap items-center gap-2 mb-1">
                  <span class="text-sm font-semibold text-blue-700 bg-blue-50 px-2 py-0.5 rounded-md">${esc(job.company)}</span>
                  ${dateBadge}
                  ${seniorityBadge}
                </div>
                <h3 class="text-base font-medium text-gray-900 leading-snug">${esc(job.title)}</h3>
                <div class="mt-1.5 flex flex-wrap items-center gap-2">
                  ${locationHtml}
                  ${expBadge}
                </div>
              </div>
              <a
                href="${esc(job.url)}"
                target="_blank"
                rel="noopener noreferrer"
                class="flex-shrink-0 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors"
              >הגש →</a>
            </div>
            ${detailsSection}
          </div>`;
      }).join("");
    }

    // ─── Helpers ──────────────────────────────────────────────────────────────
    function esc(str) {
      return (str || "").toString()
        .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }
    function formatDate(d) {
      return d.toLocaleDateString("he-IL", { day: "numeric", month: "short" });
    }
    function showError(msg) {
      document.getElementById("loading").classList.add("hidden");
      document.getElementById("error").classList.remove("hidden");
      document.getElementById("error-msg").textContent = msg;
    }

    // ─── Events ───────────────────────────────────────────────────────────────
    let timer;
    function onFilterChange() {
      clearTimeout(timer);
      timer = setTimeout(() => renderJobs(getFilteredJobs()), 150);
    }

    ["search","skill-search","company-filter","date-filter","seniority-filter","experience-filter"]
      .forEach(id => document.getElementById(id).addEventListener("input", onFilterChange));
    ["company-filter","date-filter","seniority-filter","experience-filter"]
      .forEach(id => document.getElementById(id).addEventListener("change", onFilterChange));

    document.getElementById("reset-filters").addEventListener("click", () => {
      ["search","skill-search"].forEach(id => document.getElementById(id).value = "");
      ["company-filter","date-filter","seniority-filter","experience-filter"]
        .forEach(id => document.getElementById(id).value = id === "date-filter" ? "all" : "");
      renderJobs(allJobs);
    });

    // ─── Init ─────────────────────────────────────────────────────────────────
    loadJobs();
  </script>
</body>
</html>
